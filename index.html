<body>
<div id="root"></div>
<script>
const {useState,useEffect,useRef,useMemo}=React;
const e=(t,p,...c)=>React.createElement(t,p,...c);

const DC={RM:'#0F6E56',NU:'#534AB7',NS:'#185FA5',OS:'#BA7517'};
const DIAG_LIST=['뇌경색','뇌출혈','척수손상','외상성뇌손상','파킨슨병','기타'];
const REF_LIST=['RM','NU','NS','OS','CS'];
const EVAL_FIELDS=[
  {id:'bbs',label:'BBS',unit:'점',max:56},
  {id:'mbi',label:'MBI',unit:'점',max:100},
  {id:'fac',label:'FAC',unit:'단계',max:5},
  {id:'fmaLe',label:'FMA-LE',unit:'점',max:34},
  {id:'fmaUe',label:'FMA-UE',unit:'점',max:66},
  {id:'mmse',label:'MMSE-K',unit:'점',max:30},
  {id:'tug',label:'TUG',unit:'초',max:null},
  {id:'masa',label:'MASA',unit:'점',max:200},
  {id:'mmt',label:'MMT(Rt)',unit:'등급',max:5},
  {id:'6mwt',label:'6MWT',unit:'m',max:600},
];

function riColor(v){return v>=75?'#0F6E56':v>=50?'#185FA5':v>=25?'#BA7517':'#A32D2D';}

/* ── Firebase wrapper ── */
async function fbGetPts(){
  const snap = await window._db.collection('patients').get();
  return snap.docs.map(d=>({id:d.id,...d.data()}));
}
async function fbSavePt(pt){
  const {id,...data}=pt;
  if(id){
    await window._db.collection('patients').doc(id).set(data,{merge:true});
    return id;
  } else {
    const ref=await window._db.collection('patients').add(data);
    return ref.id;
  }
}
async function fbDeletePt(id){
  await window._db.collection('patients').doc(id).delete();
}
function fbSubscribe(cb){
  return window._db.collection('patients').onSnapshot(snap=>{
    cb(snap.docs.map(d=>({id:d.id,...d.data()})));
  });
}

/* ── CSV/XLSX parser ── */
function parseRows(text){
  const lines=text.trim().split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return{pts:[],evals:[]};
  const hdrs=lines[0].split(',').map(h=>h.trim().replace(/"/g,'').toLowerCase());
  const isPatientSheet=hdrs.some(h=>/이름|name|환자|등록/.test(h));
  const pts=[],evals=[];
  if(isPatientSheet){
    for(const ln of lines.slice(1)){
      const c=ln.split(',').map(s=>s.trim().replace(/"/g,''));
      if(!c[0])continue;
      const row={};
      hdrs.forEach((h,i)=>{
        if(/이름|name/.test(h))row.name=c[i];
        else if(/등록|id|번호/.test(h))row.ptId=c[i];
        else if(/나이|age/.test(h))row.age=parseInt(c[i])||0;
        else if(/성별|gender|sex/.test(h))row.g=c[i];
        else if(/진단|diag/.test(h))row.diag=c[i];
        else if(/입원일|admit/.test(h))row.admit=c[i];
        else if(/재원|days/.test(h))row.days=parseInt(c[i])||0;
        else if(/협진|ref|주치/.test(h))row.ref=c[i];
        else if(/교수|dr|담당/.test(h))row.dr=c[i];
        else{
          const ef=EVAL_FIELDS.find(f=>f.label.toLowerCase()===h||f.id===h);
          if(ef&&c[i]){evals.push({ptId:row.ptId||row.name,field:ef.id,val:parseFloat(c[i]),date:row.admit||'—'});}
        }
      });
      if(row.name||row.ptId)pts.push(row);
    }
  } else {
    // eval-only sheet: 날짜,항목,값 or 날짜,BBS,MBI,...
    const di=hdrs.findIndex(h=>/날짜|date/.test(h));
    const ni=hdrs.findIndex(h=>/항목|평가|assessment/.test(h));
    const vi=hdrs.findIndex(h=>/값|점수|score|value/.test(h));
    if(di>=0&&ni>=0&&vi>=0){
      for(const ln of lines.slice(1)){
        const c=ln.split(',').map(s=>s.trim().replace(/"/g,''));
        const ef=EVAL_FIELDS.find(f=>f.label.toLowerCase()===c[ni]?.toLowerCase()||f.id===c[ni]?.toLowerCase());
        if(ef)evals.push({field:ef.id,val:parseFloat(c[vi]),date:c[di]});
      }
    } else if(di>=0){
      for(const ln of lines.slice(1)){
        const c=ln.split(',').map(s=>s.trim().replace(/"/g,''));
        hdrs.forEach((h,i)=>{
          const ef=EVAL_FIELDS.find(f=>f.label.toLowerCase()===h||f.id===h);
          if(ef&&c[i]){evals.push({field:ef.id,val:parseFloat(c[i]),date:c[di]});}
        });
      }
    }
  }
  return{pts,evals};
}

/* ── Sparkline ── */
function Spark({data,color}){
  if(!data||data.length<2)return null;
  const W=52,H=18,mn=Math.min(...data),mx=Math.max(...data),range=mx-mn||1;
  const pts=data.map((v,i)=>`${i/(data.length-1)*W},${H-2-(v-mn)/range*(H-5)}`).join(' ');
  return React.createElement('svg',{width:W,height:H,style:{display:'block'}},
    React.createElement('polyline',{points:pts,fill:'none',stroke:color,strokeWidth:1.8,strokeLinejoin:'round',strokeLinecap:'round'})
  );
}

/* ── Patient Card ── */
function PtCard({p,onClick}){
  const evals=p.evals||{};
  const scores=EVAL_FIELDS.map(f=>{const h=evals[f.id];return h&&h.length?h[h.length-1].v:null;}).filter(v=>v!=null);
  const ri=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length*10):p.ri||0;
  const rc=riColor(ri);
  const dc=DC[p.ref]||'#64748B';
  return e('div',{className:'ptcard',onClick},
    e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:5}},
      e('div',null,e('div',{style:{fontSize:14,fontWeight:700,color:'#132743'}},p.name||'이름없음'),e('div',{style:{fontSize:10,color:'#64748B',marginTop:1}},(p.age||'—')+'세 · '+(p.g||'—'))),
      e('span',{style:{fontSize:9,fontWeight:700,padding:'2px 7px',borderRadius:99,background:dc+'18',color:dc,border:'0.5px solid '+dc+'44'}},p.ref||'—')
    ),
    e('div',{style:{fontSize:10,color:'#475569',marginBottom:1}},p.diag||'진단 미입력'),
    e('div',{style:{fontSize:9,color:'#94A3B8',marginBottom:8}},p.dr?p.dr+' 교수':'담당 미입력'),
    e('div',{style:{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginBottom:4}},
      e('div',null,e('div',{style:{fontSize:9,color:'#94A3B8'}},'최근 평균 점수'),e('div',{style:{fontSize:20,fontWeight:700,color:rc}},ri)),
      e('div',{style:{fontSize:9,color:'#94A3B8',textAlign:'right'}},(p.days||0)+'일째')
    ),
    e('div',{style:{height:4,background:'#F1F5F9',borderRadius:99,overflow:'hidden'}},
      e('div',{style:{width:Math.min(100,ri)+'%',height:'100%',background:rc,borderRadius:99}})
    )
  );
}

/* ── Patient Row (sidebar) ── */
function PtRow({p,sel,onClick}){
  const dc=DC[p.ref]||'#64748B';
  return e('div',{className:`ptrow${sel?' sel':''}`,onClick},
    e('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between'}},
      e('div',null,
        e('div',{style:{fontSize:11,fontWeight:700,color:'#132743'}},p.name,' ',e('span',{style:{fontSize:9,color:'#94A3B8'}},p.age+'세 '+p.g)),
        e('div',{style:{fontSize:9,marginTop:1}},e('span',{style:{color:dc,fontWeight:700}},p.ref),' · ',e('span',{style:{color:'#64748B'}},p.dr||'—'))
      ),
      e('div',{style:{fontSize:9,color:'#94A3B8'}},p.days+'일')
    ),
    e('div',{style:{fontSize:9,color:'#475569',marginTop:2}},p.diag||'—')
  );
}

/* ── Add/Edit Patient Modal ── */
function PtModal({pt,onClose,onSave}){
  const isNew=!pt.id;
  const[form,setForm]=useState({name:'',ptId:'',age:'',g:'남',diag:'뇌경색',icd:'',admit:'',days:'',dept:'RM',ref:'RM',dr:'',...pt});
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  return e('div',{className:'popbg',onClick:onClose},
    e('div',{className:'pop',onClick:ev=>ev.stopPropagation()},
      e('div',{className:'poph',style:{background:isNew?'#0F6E56':'#185FA5'}},
        e('div',{className:'popt'},isNew?'+ 새 환자 등록':'환자 정보 수정'),
        e('button',{className:'popx',onClick:onClose},'✕')
      ),
      e('div',{className:'popb'},
        e('div',{className:'form-grid'},
          e('div',{className:'fld'},e('label',null,'환자명 *'),e('input',{className:'inp',value:form.name,placeholder:'홍길동',onChange:ev=>set('name',ev.target.value)})),
          e('div',{className:'fld'},e('label',null,'등록번호'),e('input',{className:'inp',value:form.ptId,placeholder:'1234567',onChange:ev=>set('ptId',ev.target.value)})),
          e('div',{className:'fld'},e('label',null,'나이'),e('input',{className:'inp',type:'number',value:form.age,onChange:ev=>set('age',ev.target.value)})),
          e('div',{className:'fld'},e('label',null,'성별'),e('select',{className:'inp',value:form.g,onChange:ev=>set('g',ev.target.value)},e('option',null,'남'),e('option',null,'여'))),
          e('div',{className:'fld inp-full'},e('label',null,'진단명'),e('select',{className:'inp',value:form.diag,onChange:ev=>set('diag',ev.target.value)},...DIAG_LIST.map(d=>e('option',{key:d},d)))),
          e('div',{className:'fld'},e('label',null,'ICD 코드'),e('input',{className:'inp',value:form.icd,placeholder:'I63',onChange:ev=>set('icd',ev.target.value)})),
          e('div',{className:'fld'},e('label',null,'입원일'),e('input',{className:'inp',value:form.admit,placeholder:'2026.03.10',onChange:ev=>set('admit',ev.target.value)})),
          e('div',{className:'fld'},e('label',null,'재원일수'),e('input',{className:'inp',type:'number',value:form.days,onChange:ev=>set('days',ev.target.value)})),
          e('div',{className:'fld'},e('label',null,'협진/주치과'),e('select',{className:'inp',value:form.ref,onChange:ev=>set('ref',ev.target.value)},...REF_LIST.map(r=>e('option',{key:r},r)))),
          e('div',{className:'fld'},e('label',null,'담당교수'),e('input',{className:'inp',value:form.dr,placeholder:'김재활',onChange:ev=>set('dr',ev.target.value)}))
        ),
        e('div',{style:{display:'flex',gap:8,padding:'0 14px 4px'}},
          e('button',{className:'btn btn-g',style:{flex:1},onClick:async()=>{
            if(!form.name){alert('환자명을 입력해주세요');return;}
            await onSave({...form,age:parseInt(form.age)||0,days:parseInt(form.days)||0,evals:pt.evals||{}});
            onClose();
          }},isNew?'등록':'저장'),
          e('button',{className:'btn btn-gray',onClick:onClose},'취소')
        )
      )
    )
  );
}

/* ── Eval Entry Modal ── */
function EvalModal({pt,onClose,onSave}){
  const[date,setDate]=useState(new Date().toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'}).replace('. ','').replace('.','')||'');
  const[vals,setVals]=useState({});
  const setV=(id,v)=>setVals(p=>({...p,[id]:v}));
  return e('div',{className:'popbg',onClick:onClose},
    e('div',{className:'pop',onClick:ev=>ev.stopPropagation()},
      e('div',{className:'poph',style:{background:'#534AB7'}},
        e('div',{className:'popt'},'📋 평가 입력 — '+pt.name),
        e('button',{className:'popx',onClick:onClose},'✕')
      ),
      e('div',{className:'popb'},
        e('div',{style:{marginBottom:10}},
          e('label',{style:{fontSize:10,color:'#64748B',display:'block',marginBottom:4,fontWeight:600}},'측정일'),

/* ── PDF.js text extractor ── */
async function extractPdfText(arrayBuffer){
  const pdf=await pdfjsLib.getDocument({data:arrayBuffer}).promise;
  let full='';
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);
    const tc=await page.getTextContent();
    full+=tc.items.map(it=>it.str).join(' ')+'
';
  }
  return full;
}

/* ── Claude AI PDF parser (requires backend proxy — disabled for GitHub Pages) ── */
async function parseWithClaude(base64Data, mediaType, filename){
  const prompt=`이 파일은 재활의학과 환자 평가 자료입니다.
파일에서 다음 정보를 추출하여 반드시 JSON만 반환하세요 (다른 텍스트 없이):
{
  "patients": [
    {
      "name": "환자명",
      "ptId": "등록번호",
      "age": 나이(숫자),
      "g": "남 또는 여",
      "diag": "진단명",
      "icd": "ICD코드",
      "admit": "입원일(MM.DD 형식)",
      "days": 재원일수(숫자),
      "ref": "협진과(RM/NU/NS/OS 중 하나)",
      "dr": "담당교수명",
      "evals": {
        "bbs": [{"date":"MM.DD","v":숫자}],
        "mbi": [{"date":"MM.DD","v":숫자}],
        "fac": [{"date":"MM.DD","v":숫자}],
        "fmaLe": [{"date":"MM.DD","v":숫자}],
        "fmaUe": [{"date":"MM.DD","v":숫자}],
        "mmse": [{"date":"MM.DD","v":숫자}],
        "tug": [{"date":"MM.DD","v":숫자}],
        "masa": [{"date":"MM.DD","v":숫자}],
        "mmt": [{"date":"MM.DD","v":숫자}],
        "6mwt": [{"date":"MM.DD","v":숫자}]
      }
    }
  ]
}
없는 항목은 빈 배열([]) 또는 빈 문자열("")로 두세요. 숫자만 있는 항목은 숫자로, 날짜가 없으면 "00.00"으로 표기.`;

  const contentBlock = mediaType === 'text/plain'
    ? {type:'text', text: atob(base64Data)}
    : {type:'document', source:{type:'base64', media_type:mediaType, data:base64Data}};

  const resp = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:2000,
      messages:[{role:'user',content:[contentBlock,{type:'text',text:prompt}]}]
    })
  });
  const data = await resp.json();
  const text = data.content?.map(c=>c.text||'').join('');
  const clean = text.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

/* ── Free-text PDF parser (keyword scan) ── */
function parseFreeText(text){
  const lines=text.split(/\n/).map(l=>l.trim()).filter(l=>l);
  const pt={name:'',ptId:'',age:0,g:'',diag:'',icd:'',admit:'',days:0,ref:'',dr:'',evals:{}};
  const evalMap={BBS:'bbs',MBI:'mbi',FAC:'fac','FMA-LE':'fmaLe','FMA-UE':'fmaUe',
    'MMSE':'mmse','MMSE-K':'mmse',TUG:'tug',MASA:'masa','MMT':'mmt','6MWT':'6mwt'};

  for(const line of lines){
    // 이름
    if(!pt.name&&/환자명|이름|성명/.test(line)){const m=line.match(/[가-힣]{2,5}(?=\s|$)/);if(m)pt.name=m[0];}
    // 등록번호
    if(!pt.ptId){const m=line.match(/등록번호[^\d]*(\d{5,8})/);if(m)pt.ptId=m[1];}
    // 나이
    if(!pt.age){const m=line.match(/(\d{1,3})\s*세/);if(m)pt.age=parseInt(m[1]);}
    // 성별
    if(!pt.g){if(/남성|남자|\bM\b/.test(line))pt.g='남';else if(/여성|여자|\bF\b/.test(line))pt.g='여';}
    // 진단
    if(!pt.diag){
      const dm=line.match(/(뇌경색|뇌출혈|척수손상|외상성뇌손상|파킨슨)/);if(dm)pt.diag=dm[1];
      const icdm=line.match(/([A-Z]\d{2}(?:\.\d{1,2})?)/);if(icdm)pt.icd=icdm[1];
    }
    // 입원일
    if(!pt.admit){const m=line.match(/(\d{4})[./-](\d{1,2})[./-](\d{1,2})/);if(m)pt.admit=m[2].padStart(2,'0')+'.'+m[3].padStart(2,'0');}
    // 재원
    if(!pt.days){const m=line.match(/재원\s*(\d+)/);if(m)pt.days=parseInt(m[1]);}
    // 담당/협진
    if(!pt.dr){const m=line.match(/(?:담당|교수)[^가-힣]*([가-힣]{2,4})\s*교수/);if(m)pt.dr=m[1];}
    if(!pt.ref){const m=line.match(/\b(RM|NU|NS|OS|CS)\b/);if(m)pt.ref=m[1];}
    // 평가 점수
    for(const[label,id] of Object.entries(evalMap)){
      const re=new RegExp(label+'[^\\d]*(\\d{1,3})(?:\\s*(?:점|초|m|단계|등급))?');
      const m=line.match(re);
      if(m){
        const dateM=line.match(/(\d{2})[.](\d{2})/);
        const date=dateM?dateM[0]:'00.00';
        if(!pt.evals[id])pt.evals[id]=[];
        if(!pt.evals[id].some(h=>h.date===date))
          pt.evals[id].push({date,v:parseFloat(m[1])});
      }
    }
  }
  if(!pt.name)pt.name='파싱된 환자';
  return pt;
}

function UploadModal({onClose,onParsed}){
  const[log,setLog]=useState([]);
  const[drag,setDrag]=useState(false);
  const[parsing,setParsing]=useState(false);
  const[preview,setPreview]=useState(null); // {pts, evals, fname}
  const fr=useRef();
  const addLog=m=>setLog(p=>[...p,m]);

  async function proc(file){
    const nm=file.name.toLowerCase();
    setParsing(true);
    try{
      // PDF → Claude AI 파싱
      if(nm.endsWith('.pdf')){
        addLog('📄 '+file.name+' → 텍스트 추출 중...');
        const buf=await file.arrayBuffer();
        let text='';
        try{
          text=await extractPdfText(buf.slice(0));
        }catch(err){
          addLog('⚠️ PDF 텍스트 추출 실패: '+err.message);
          setParsing(false);return;
        }
        if(!text.trim()){
          addLog('⚠️ 텍스트가 없는 스캔 PDF입니다. 텍스트 PDF(EMR 출력본)를 사용해주세요.');
          setParsing(false);return;
        }
        addLog('📝 텍스트 추출 완료 ('+text.length+'자) → 항목 분석 중...');
        // 규칙 기반 파싱 먼저 시도
        const{pts:rPts,evals:rEvals}=parseRows(text);
        if(rPts.length>0||rEvals.length>0){
          addLog('✅ '+file.name+' → 환자 '+rPts.length+'명, 평가 '+rEvals.length+'건 파싱 완료');
          setPreview({pts:rPts,evals:rEvals,fname:file.name,rawText:text});
        } else {
          // 규칙 기반 실패 시 키워드 스캔 파서
          const pt=parseFreeText(text);
          addLog('✅ '+file.name+' → 자유형식 파싱 완료');
          setPreview({pts:[pt],evals:[],fname:file.name,rawText:text});
        }
      }
      // Excel → 텍스트 변환 후 파싱
      else if(nm.endsWith('.xlsx')||nm.endsWith('.xls')){
        const buf=await file.arrayBuffer();
        const wb=XLSX.read(buf,{type:'array'});
        // 모든 시트 합치기
        const allText=wb.SheetNames.map(sn=>XLSX.utils.sheet_to_csv(wb.Sheets[sn])).join('\n');
        // 먼저 규칙 기반 파싱 시도
        const{pts,evals}=parseRows(allText);
        if(pts.length>0||evals.length>0){
          addLog('✅ '+file.name+' → 환자 '+pts.length+'명, 평가 '+evals.length+'건 파싱');
          setPreview({pts,evals,fname:file.name});
        } else {
          // 규칙 기반 실패 시 Claude AI 파싱
          addLog('🤖 '+file.name+' → 형식 불명확, Claude AI 분석 중...');
          const b64=btoa(unescape(encodeURIComponent(allText)));
          const result=await parseWithClaude(b64,'text/plain',file.name);
          const aiPts=result.patients||[];
          addLog('✅ '+file.name+' → 환자 '+aiPts.length+'명 AI 파싱 완료');
          setPreview({pts:aiPts,evals:[],fname:file.name});
        }
      }
      // CSV → 규칙 기반 파싱
      else if(nm.endsWith('.csv')){
        const text=await file.text();
        const{pts,evals}=parseRows(text);
        if(pts.length>0||evals.length>0){
          addLog('✅ '+file.name+' → 환자 '+pts.length+'명, 평가 '+evals.length+'건 파싱');
          setPreview({pts,evals,fname:file.name});
        } else {
          addLog('🤖 '+file.name+' → Claude AI 분석 중...');
          const b64=btoa(unescape(encodeURIComponent(text)));
          const result=await parseWithClaude(b64,'text/plain',file.name);
          const aiPts=result.patients||[];
          addLog('✅ '+file.name+' → 환자 '+aiPts.length+'명 AI 파싱 완료');
          setPreview({pts:aiPts,evals:[],fname:file.name});
        }
      }
      else{ addLog('⚠️ '+file.name+': PDF, CSV, XLSX만 지원'); }
    }catch(err){
      addLog('❌ '+file.name+': '+err.message);
      console.error(err);
    }
    setParsing(false);
  }

  return e('div',{className:'popbg',onClick:()=>!parsing&&onClose()},
    e('div',{className:'pop',style:{maxWidth:540},onClick:ev=>ev.stopPropagation()},
      e('div',{className:'poph',style:{background:'#132743'}},
        e('div',{className:'popt'},'📁 파일 업로드 — PDF · Excel · CSV'),
        e('button',{className:'popx',onClick:()=>!parsing&&onClose()},'✕')
      ),
      e('div',{className:'popb'},
        /* Upload zone */
        e('div',{className:'upzone'+(drag?' drag':''),
          style:parsing?{opacity:.6,pointerEvents:'none'}:{},
          onDragOver:ev=>{ev.preventDefault();setDrag(true);},
          onDragLeave:()=>setDrag(false),
          onDrop:async ev=>{ev.preventDefault();setDrag(false);for(const f of ev.dataTransfer.files)await proc(f);},
          onClick:()=>fr.current?.click()},
          e('div',{style:{fontSize:28,marginBottom:6}},parsing?'⏳':'📄'),
          e('div',{style:{fontSize:13,fontWeight:700,color:'#132743'}},
            parsing?'Claude AI가 분석 중입니다...':'PDF · Excel · CSV 드래그 또는 클릭'),
          e('div',{style:{fontSize:10,color:'#94A3B8',marginTop:3}},'.pdf · .xlsx · .xls · .csv')
        ),
        e('input',{ref:fr,type:'file',accept:'.pdf,.csv,.xlsx,.xls',multiple:true,
          style:{display:'none'},onChange:async ev=>{for(const f of ev.target.files)await proc(f);}}),

        /* 방식 안내 */
        e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,margin:'10px 0 4px',fontSize:10}},
          e('div',{style:{background:'#FFF7ED',border:'0.5px solid #F59E0B',borderRadius:8,padding:'8px 10px'}},
            e('div',{style:{fontWeight:700,color:'#B45309',marginBottom:3}},'🤖 AI 파싱 (PDF/불규칙 Excel)'),
            e('div',{style:{color:'#78350F',lineHeight:1.7}},'어떤 형식의 평가지든 자동 인식',e('br',null),'스캔본도 분석 가능',e('br',null),'병원 자체 양식 OK')
          ),
          e('div',{style:{background:'#F0FDF4',border:'0.5px solid #22C55E',borderRadius:8,padding:'8px 10px'}},
            e('div',{style:{fontWeight:700,color:'#15803D',marginBottom:3}},'📊 규칙 파싱 (CSV/정형 Excel)'),
            e('div',{style:{color:'#166534',lineHeight:1.7}},'이름,나이,진단,BBS,MBI...',e('br',null),'날짜,BBS,MBI,FAC...',e('br',null),'빠르고 정확')
          )
        ),

        /* 로그 */
        log.length>0&&e('div',{className:'parse-log'},log.map((l,i)=>e('div',{key:i},l))),

        /* 파싱 결과 미리보기 */
        preview&&e('div',{style:{border:'1.5px solid #1D9E75',borderRadius:10,margin:'10px 0 4px',overflow:'hidden'}},

            e('span',{style:{fontSize:12,fontWeight:700,color:'#fff'}},'✅ 파싱 결과 — 환자 '+preview.pts.length+'명'),
            e('span',{style:{fontSize:10,color:'#86efac'}},'아래 내용 확인 후 등록하세요')

          e('div',{style:{maxHeight:220,overflowY:'auto'}},
            preview.pts.length===0
              ? e('div',{style:{padding:'16px',textAlign:'center',color:'#94A3B8',fontSize:12}},'인식된 환자 정보가 없습니다. PDF 내용을 확인해주세요.')
              : preview.pts.map((p,i)=>e('div',{key:i,style:{padding:'8px 12px',borderBottom:'0.5px solid #E2E8F0',fontSize:11}},
                  e('div',{style:{display:'flex',gap:12,flexWrap:'wrap',alignItems:'center'}},

    e('div',{className:'fg'},e('span',{className:'flbl'},'진단'),opt('diag','전체','전체'),...DIAG_LIST.map(d=>opt('diag',d,d))),
    e('div',{className:'fg'},e('span',{className:'flbl'},'과'),opt('ref','전체','전체'),...REF_LIST.map(r=>opt('ref',r,r,DC[r]))),
    e('span',{style:{marginLeft:'auto',fontSize:11,fontWeight:600,color:cnt<total?'#BA7517':'#94A3B8'}},cnt<total?cnt+' / '+total+'명':total+'명')
  );
}

/* ── APP ── */
function App(){
  const[pts,setPts]=useState([]);
  const[fbOk,setFbOk]=useState(false);
  const[selId,setSelId]=useState(null);
  const[sidebar,setSidebar]=useState(true);
  const[modal,setModal]=useState(null);
  const[f,setF]=useState({age:'전체',g:'전체',diag:'전체',ref:'전체'});
  const[log,setLog]=useState('');

  useEffect(()=>{
    function init(){
      setFbOk(true);
      const unsub=fbSubscribe(data=>{
        setPts(data);
        setLog('마지막 동기화: '+new Date().toLocaleTimeString());
      });
      return unsub;
    }
    // compat SDK loads synchronously via script tag
    if(window._db&&window._fbReady){
      const u=init();return ()=>u&&u();
    }
    // fallback: wait for event
    let unsub=null;
    function onReady(){unsub=init();}
    window.addEventListener('fbReady',onReady,{once:true});
    return ()=>{
      window.removeEventListener('fbReady',onReady);
      if(unsub)unsub();
    };
  },[]);

  const filtPts=useMemo(()=>pts.filter(p=>{
    const a=f.age;
    if(a==='<60'&&p.age>=60)return false;
    if(a==='60s'&&(p.age<60||p.age>=70))return false;
    if(a==='70s'&&(p.age<70||p.age>=80))return false;
    if(a==='80+'&&p.age<80)return false;
    if(f.g!=='전체'&&p.g!==f.g)return false;
    if(f.diag!=='전체'&&p.diag!==f.diag)return false;
    if(f.ref!=='전체'&&p.ref!==f.ref)return false;
    return true;
  }),[pts,f]);

  const selPt=selId?pts.find(p=>p.id===selId):null;

  async function savePt(data){
    const saved=await fbSavePt(data);
    if(!data.id)setSelId(saved);
  }
  async function deletePt(id){
    await fbDeletePt(id);
    setSelId(null);
  }
  async function handleParsed(newPts,newEvals,fname){
    for(const p of newPts){
      const existing=pts.find(x=>x.ptId===p.ptId||x.name===p.name);
      if(existing){
        const merged={...existing,...p,evals:existing.evals||{}};
        await fbSavePt(merged);
      } else {
        await fbSavePt({...p,evals:{}});
      }
    }
    if(selPt&&newEvals.length){
      const newEv={...(selPt.evals||{})};
      for(const ev of newEvals){
        if(!newEv[ev.field])newEv[ev.field]=[];
        if(!newEv[ev.field].some(h=>h.date===ev.date))
          newEv[ev.field]=[...newEv[ev.field],{date:ev.date,v:ev.val}].sort((a,b)=>a.date.localeCompare(b.date));
      }
      await fbSavePt({...selPt,evals:newEv});
    }
    setModal(null);
  }

  return e('div',null,
    /* AppBar */
    e('div',{className:'appbar'},
      e('div',{className:'al'},'AI'),
      e('div',null,e('div',{className:'at'},'재활의학과 통합 대시보드'),e('div',{className:'as'},'한림대학교 성심병원 · 재활의학팀')),
      fbOk
        ? e('span',{style:{fontSize:10,color:'#86efac',marginLeft:4}},e('span',{className:'sync-dot'}),'실시간 연결 · '+log)
        : e('span',{style:{fontSize:10,color:'#fca5a5',marginLeft:4}},e('span',{className:'sync-dot off'}),'Firebase 연결 중...'),
      selId&&e('button',{className:'ab',style:{marginLeft:8},onClick:()=>setSelId(null)},'← 목록'),
      e('button',{className:'ab ab-g',style:{marginLeft:'auto'},onClick:()=>setModal({type:'upload'})},'📁 파일 업로드'),
      e('button',{className:'ab ab-g',onClick:()=>setModal({type:'addPt'})},'+ 환자 등록')
    ),

    /* LIST VIEW */
    !selId&&e('div',null,
      e(FilterBar,{f,setF,cnt:filtPts.length,total:pts.length}),
      e('div',{className:'statsbar'},
        e('span',null,'전체 ',e('b',null,pts.length),'명'),
        e('span',null,'필터 ',e('b',null,filtPts.length),'명'),
        e('span',null,'남 ',e('b',null,filtPts.filter(p=>p.g==='남').length),' / 여 ',e('b',null,filtPts.filter(p=>p.g==='여').length)),
        ...REF_LIST.map(r=>e('span',{key:r},e('span',{style:{color:DC[r]||'#64748B',fontWeight:700}},r),' ',e('b',null,filtPts.filter(p=>p.ref===r).length)))
      ),
      pts.length===0&&e('div',{style:{textAlign:'center',padding:'60px',color:'#94A3B8',fontSize:13}},
        fbOk?'등록된 환자가 없습니다. "환자 등록" 버튼을 눌러 추가하세요.':'Firebase 연결 중...'
      ),
      e('div',{className:'ptlist'},
        ...filtPts.map(p=>e(PtCard,{key:p.id,p,onClick:()=>setSelId(p.id)})),
        filtPts.length===0&&pts.length>0&&e('div',{style:{gridColumn:'1/-1',textAlign:'center',padding:'40px',color:'#94A3B8',fontSize:13}},'조건에 맞는 환자가 없습니다.')
      )
    ),

    /* DETAIL VIEW */
    selPt&&e('div',{className:'split'},
      sidebar&&e('div',{className:'sidebar'},
        e('div',{className:'sbhdr'},e('span',null,filtPts.length+'명'),e('button',{style:{fontSize:10,background:'none',border:'none',cursor:'pointer',color:'#64748B',fontFamily:'var(--font)'},onClick:()=>setSidebar(false)},'✕')),
        ...filtPts.map(p=>e(PtRow,{key:p.id,p,sel:p.id===selId,onClick:()=>setSelId(p.id)}))
      ),
      !sidebar&&e('button',{className:'ab',style:{margin:'12px 0 0 12px',background:'#132743',display:'block'},onClick:()=>setSidebar(true)},'☰ 목록'),
      e(DetailView,{pt:selPt,
        onEdit:()=>setModal({type:'editPt',pt:selPt}),
        onAddEval:()=>setModal({type:'eval',pt:selPt}),
        onDelete:deletePt
      })
    ),

    /* MODALS */
    modal?.type==='addPt'&&e(PtModal,{pt:{},onClose:()=>setModal(null),onSave:savePt}),
    modal?.type==='editPt'&&e(PtModal,{pt:modal.pt,onClose:()=>setModal(null),onSave:savePt}),
    modal?.type==='eval'&&e(EvalModal,{pt:modal.pt,onClose:()=>setModal(null),onSave:async(updated)=>{await fbSavePt(updated);setModal(null);}}),
    modal?.type==='upload'&&e(UploadModal,{onClose:()=>setModal(null),onParsed:handleParsed})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
