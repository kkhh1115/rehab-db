<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
:root{--navy:#132743;--navy2:#1E3555;--teal:#0F6E56;--teal2:#1D9E75;--tealLt:#E1F5EE;--blue:#185FA5;--purple:#534AB7;--amber:#BA7517;--amberLt:#FAEEDA;--red:#A32D2D;--gray:#64748B;--border:#E2E8F0;--off:#F8FAFC;--font:'Noto Sans KR',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:#EEF2F7;min-height:100vh;}
/* AppBar */
.appbar{background:var(--navy);padding:9px 16px;display:flex;align-items:center;gap:7px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.35);}
.al{width:28px;height:28px;border-radius:7px;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
.at{font-size:12px;font-weight:700;color:#fff;}.as{font-size:9px;color:#8FAEC5;margin-top:1px;}
.ab{font-size:10px;background:rgba(255,255,255,.15);color:#fff;padding:3px 10px;border-radius:99px;cursor:pointer;border:0.5px solid rgba(255,255,255,.3);font-family:var(--font);white-space:nowrap;}
.ab-g{background:var(--teal2);border-color:var(--teal2);}.ab-on{background:rgba(255,255,255,.28);}
/* Patient bar */
.ptbar{background:var(--navy2);border-bottom:2px solid var(--teal2);padding:7px 14px;display:flex;flex-wrap:wrap;align-items:center;}
.ptseg{padding:0 10px;border-right:1px solid #2D4A6E;}.ptseg:first-child{padding-left:0;}.ptseg:last-child{border-right:none;}
.ptl{font-size:9px;color:#8FAEC5;margin-bottom:1px;}.ptv{font-size:11px;font-weight:600;color:#fff;}
.ptbtn{margin-left:auto;font-size:10px;background:rgba(255,255,255,.15);border:0.5px solid rgba(255,255,255,.3);color:#fff;padding:3px 10px;border-radius:6px;cursor:pointer;font-family:var(--font);}
/* Filter bar */
.fltbar{background:#fff;border-bottom:0.5px solid var(--border);padding:6px 14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.fg{display:flex;align-items:center;gap:3px;flex-wrap:wrap;}
.flbl{font-size:9px;font-weight:700;color:var(--gray);white-space:nowrap;margin-right:1px;}
.fopt{font-size:10px;padding:3px 9px;border-radius:99px;border:0.5px solid var(--border);background:var(--off);cursor:pointer;font-family:var(--font);transition:all .15s;white-space:nowrap;}
.fopt.on{color:#fff;border-color:transparent;}
/* Stats */
.statsbar{background:#FAFBFC;border-bottom:0.5px solid var(--border);padding:5px 14px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-size:10px;color:var(--gray);}
.statsbar b{color:#132743;}
/* Patient list grid */
.ptlist{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:10px 14px 20px;}
.ptcard{background:#fff;border:0.5px solid var(--border);border-radius:12px;padding:11px 12px;cursor:pointer;transition:all .18s;}
.ptcard:hover{box-shadow:0 3px 16px rgba(0,0,0,.12);border-color:var(--teal2);}
.ptcard.sel{border:1.5px solid var(--teal2);box-shadow:0 0 0 3px #E1F5EE;}
.dtag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;display:inline-block;}
/* Split layout */
.split{display:flex;align-items:flex-start;}
.sidebar{width:250px;flex-shrink:0;border-right:0.5px solid var(--border);background:#fff;overflow-y:auto;max-height:calc(100vh - 56px);position:sticky;top:56px;}
.sbhdr{padding:8px 12px;border-bottom:0.5px solid var(--border);font-size:11px;font-weight:700;color:#132743;display:flex;justify-content:space-between;align-items:center;background:var(--off);position:sticky;top:0;z-index:5;}
.ptrow{padding:8px 12px;border-bottom:0.5px solid #F1F5F9;cursor:pointer;transition:background .1s;}
.ptrow:hover{background:#F8FAFC;}.ptrow.sel{background:var(--tealLt);border-left:3px solid var(--teal2);}
.main{flex:1;min-width:0;}
/* Dashboard internals (from original) */
.notice{background:var(--amberLt);border:0.5px solid var(--amber);border-radius:6px;padding:5px 12px;margin:6px 14px 0;font-size:10px;color:var(--amber);}
.kstrip{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;padding:8px 14px 0;}
.kcard{border-radius:10px;padding:9px 11px;text-align:center;border:0.5px solid var(--border);}
.kl{font-size:9px;margin-bottom:2px;}.kv{font-size:20px;font-weight:700;line-height:1.15;}.ks{font-size:9px;color:#94A3B8;margin-top:2px;}
.frow{display:flex;gap:4px;padding:8px 14px 0;flex-wrap:wrap;}
.ftab{padding:5px 11px;border-radius:99px;border:0.5px solid var(--border);background:#fff;font-size:10px;font-weight:600;color:var(--gray);cursor:pointer;font-family:var(--font);transition:all .15s;}
.ftab.on{color:#fff;border-color:transparent;}
.mg{display:grid;grid-template-columns:1fr 300px;gap:10px;padding:10px 14px 20px;}
.card{background:#fff;border:0.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.ch{display:flex;align-items:center;justify-content:space-between;padding:9px 12px 7px;}
.ct{font-size:11px;font-weight:700;color:var(--navy);}.cc{font-size:9px;color:var(--gray);font-style:italic;}
.agrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:0 10px 10px;}
.acard{border-radius:8px;padding:9px 10px;background:var(--off);border:0.5px solid var(--border);cursor:pointer;transition:all .18s;position:relative;}
.acard:hover{border-color:var(--teal2);box-shadow:0 2px 10px rgba(0,0,0,.1);}
.an{font-size:9px;color:var(--gray);margin-bottom:2px;}.av{font-size:21px;font-weight:700;line-height:1.1;}.am{font-size:9px;color:#94A3B8;margin-top:1px;}.ad{position:absolute;right:7px;bottom:7px;font-size:10px;font-weight:700;}
.gtabs{display:flex;gap:3px;padding:6px 12px 0;flex-wrap:wrap;}
.gtab{padding:4px 9px;border-radius:6px;border:0.5px solid var(--border);background:#fff;font-size:10px;font-weight:600;color:var(--gray);cursor:pointer;font-family:var(--font);transition:all .15s;}
.gtab.on{color:#fff;border-color:transparent;}
.gw{padding:4px 12px 10px;height:190px;}
.egrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:0 10px 10px;}
.ecard{border-radius:8px;padding:9px 10px;border:0.5px solid var(--border);}
.en{font-size:10px;font-weight:700;margin-bottom:3px;}.ev{font-size:16px;font-weight:700;line-height:1.2;}.es{font-size:9px;color:var(--gray);margin-top:2px;}
.imgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:0 10px 10px;}
.imcard{border-radius:8px;overflow:hidden;border:0.5px solid var(--border);}
.imthumb{height:52px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;}
.iminfo{padding:5px 8px;}.iml{font-size:10px;font-weight:700;}.imd{font-size:9px;color:var(--gray);}
.ribig{font-size:50px;font-weight:700;text-align:center;line-height:1;}
.risub{text-align:center;margin:4px 0 10px;display:flex;align-items:center;justify-content:center;gap:6px;}
.ribadge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:99px;color:#fff;}
.rigrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:0 12px 12px;}
.ridom{border-radius:7px;padding:7px 9px;}.rdn{font-size:9px;font-weight:700;margin-bottom:3px;}.rdb{height:4px;border-radius:99px;background:#e2e8f0;margin-bottom:3px;}.rdbf{height:100%;border-radius:99px;}.rdv{font-size:13px;font-weight:700;}
.rifo{padding:6px 12px 12px;font-size:10px;color:#475569;line-height:1.8;}
.airow{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;border-bottom:0.5px solid var(--off);}
.ail{font-size:11px;color:var(--gray);}.aiv{font-size:11px;font-weight:700;}.aic{font-size:9px;color:#94A3B8;margin-left:4px;}
/* Popup */
.popbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:14px;}
.pop{background:#fff;border-radius:14px;width:100%;max-width:420px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.25);}
.poph{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.popt{font-size:12px;font-weight:700;color:#fff;}
.popx{background:rgba(255,255,255,.25);border:none;color:#fff;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;font-family:var(--font);}
.popb{padding:12px 14px;overflow-y:auto;}
.hrow{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.hdate{font-size:11px;color:#94A3B8;width:40px;flex-shrink:0;}
.hbar{flex:1;height:9px;background:#F1F5F9;border-radius:99px;overflow:hidden;}
.hfill{height:100%;border-radius:99px;}
.hscore{font-size:12px;font-weight:700;width:44px;text-align:right;}
.fb{background:var(--off);border-radius:8px;padding:8px 10px;border:0.5px solid var(--border);font-size:11px;color:#475569;line-height:1.7;margin-top:8px;font-style:italic;}
/* Sparkline */
.spark svg{display:block;}
@media(max-width:1200px){.ptlist{grid-template-columns:repeat(3,1fr);}}
@media(max-width:900px){.ptlist{grid-template-columns:repeat(2,1fr);}.mg{grid-template-columns:1fr;}}
@media(max-width:600px){.ptlist{grid-template-columns:1fr;}.split{flex-direction:column;}.sidebar{width:100%;max-height:200px;position:static;}}
</style>

/* ── helpers ── */
function sc(a){const last=a.hist[a.hist.length-1]?.v,first=a.hist[0]?.v;if(last==null||first==null)return null;if(a.hi){const d=a.max-first;return d<=0?last/a.max*100:Math.min(100,Math.max(0,(last-first)/d*100));}return first<=0?0:Math.min(100,Math.max(0,(first-last)/first*100));}
function calcRI(asmts){const dom={};for(const[k,d]of Object.entries(RID)){const s=d.ids.map(id=>{const a=asmts.find(x=>x.id===id);return a?sc(a):null;}).filter(x=>x!=null);dom[k]=s.length?Math.round(s.reduce((a,b)=>a+b,0)/s.length):null;}let tw=0,ts=0;for(const[k,d]of Object.entries(RID)){if(dom[k]!=null){tw+=d.w;ts+=d.w*dom[k];}}return{ri:tw>0?Math.round(ts/tw):null,dom};}
function dv(a){if(a.hist.length<2)return null;return a.hist[a.hist.length-1].v-a.hist[0].v;}
function riGraph(asmts){const dates=['03.12','03.19','03.26','04.02','04.10','04.17'];return dates.map(date=>{let tw=0,ts=0;for(const[k,d]of Object.entries(RID)){const s=d.ids.map(id=>{const a=asmts.find(x=>x.id===id);if(!a)return null;const h=a.hist.filter(x=>x.d<=date).slice(-1)[0];if(!h)return null;const f=a.hist[0].v;if(a.hi){const dn=a.max-f;return dn<=0?h.v/a.max*100:Math.min(100,Math.max(0,(h.v-f)/dn*100));}return f<=0?0:Math.min(100,Math.max(0,(f-h.v)/f*100));}).filter(x=>x!=null);if(s.length){const avg=s.reduce((a,b)=>a+b,0)/s.length;tw+=d.w;ts+=d.w*avg;}}return{date,value:tw>0?Math.round(ts/tw):null};}).filter(x=>x.value!=null);}
function riColor(v){return v>=75?'#0F6E56':v>=50?'#185FA5':v>=25?'#BA7517':'#A32D2D';}
function riLabel(v){return v>=75?'우수':v>=50?'양호':v>=25?'부분':'최소';}

/* ── Sparkline ── */
function Spark({data,color}){
  if(!data||data.length<2)return null;
  const W=52,H=20,mn=Math.min(...data),mx=Math.max(...data),range=mx-mn||1;
  const pts=data.map((v,i)=>`${i/(data.length-1)*W},${H-2-(v-mn)/range*(H-5)}`).join(' ');
  return e('svg',{width:W,height:H},e('polyline',{points:pts,fill:'none',stroke:color,strokeWidth:1.8,strokeLinejoin:'round',strokeLinecap:'round'}));
}

/* ── SvgLineChart ── */
function SvgLineChart({data,color}){
  if(!data||!data.length)return e('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',fontSize:11,color:'#94A3B8'}},'데이터 없음');
  const W=560,H=160,PL=32,PR=12,PT=8,PB=24,vals=data.map(d=>d.value);
  const mn=Math.min(...vals),mx=Math.max(...vals),range=mx-mn||1;
  const px=i=>PL+(i/(data.length-1||1))*(W-PL-PR),py=v=>PT+(H-PT-PB)*(1-(v-mn)/range);
  const pts=data.map((d,i)=>({x:px(i),y:py(d.value),d}));
  const poly=pts.map(p=>p.x+','+p.y).join(' ');
  const[tip,setTip]=React.useState(null);
  const yl=Array.from({length:5},(_,i)=>mn+Math.round(range*i/4));
  return e('svg',{viewBox:`0 0 ${W} ${H}`,style:{width:'100%',height:'100%'},preserveAspectRatio:'none'},
    ...yl.map((v,i)=>{const y=py(v);return e('g',{key:'g'+i},e('line',{x1:PL,y1:y,x2:W-PR,y2:y,stroke:'#F1F5F9',strokeWidth:1}),e('text',{x:PL-4,y:y+4,fontSize:9,fill:'#94A3B8',textAnchor:'end'},v));}),
    ...pts.map((p,i)=>i%(Math.ceil(data.length/6))===0?e('text',{key:'x'+i,x:p.x,y:H-4,fontSize:9,fill:'#94A3B8',textAnchor:'middle'},p.d.date):null),
    e('polyline',{points:poly+` ${W-PR},${H-PB} ${PL},${H-PB}`,fill:color+'22',stroke:'none'}),
    e('polyline',{points:poly,fill:'none',stroke:color,strokeWidth:2.5,strokeLinejoin:'round',strokeLinecap:'round'}),
    ...pts.map((p,i)=>e('g',{key:'d'+i,onMouseEnter:()=>setTip({x:p.x,y:p.y,val:p.d.value,date:p.d.date}),onMouseLeave:()=>setTip(null)},e('circle',{cx:p.x,cy:p.y,r:4,fill:color,stroke:'#fff',strokeWidth:1.5}))),
    tip&&e('g',{key:'tip'},e('rect',{x:tip.x-28,y:tip.y-28,width:56,height:22,rx:5,fill:'#132743',opacity:.92}),e('text',{x:tip.x,y:tip.y-13,fontSize:10,fill:'#fff',textAnchor:'middle',fontWeight:600},tip.date+' · '+tip.val))
  );
}
