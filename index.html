:root{

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:#EEF2F7;min-height:100vh;}
.appbar{background:var(--navy);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.35);}

.as{font-size:10px;color:#8FAEC5;margin-top:1px;}
.ab{margin-left:auto;font-size:10px;background:var(--teal2);color:#fff;padding:2px 10px;border-radius:99px;white-space:nowrap;}
.ptbar{background:var(--navy2);border-bottom:2px solid var(--teal2);padding:8px 14px;display:flex;flex-wrap:wrap;}
.ptseg{padding:0 12px;border-right:1px solid #2D4A6E;}
.ptseg:first-child{padding-left:0;}
.ptseg:last-child{border-right:none;}
.ptl{font-size:9px;color:#8FAEC5;margin-bottom:1px;}
.ptv{font-size:11px;font-weight:600;color:#fff;}
.notice{background:var(--amberLt);border:0.5px solid var(--amber);border-radius:6px;padding:6px 12px;margin:8px 14px 0;font-size:10px;color:var(--amber);}
.kstrip{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;padding:8px 14px 0;}

.kl{font-size:9px;margin-bottom:2px;}
.kv{font-size:20px;font-weight:700;line-height:1.15;}
.ks{font-size:9px;color:#94A3B8;margin-top:2px;}

.ftab.on{color:#fff;border-color:transparent;}

.card{background:#fff;border:0.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}

.an{font-size:9px;color:var(--gray);margin-bottom:2px;}

.am{font-size:9px;color:#94A3B8;margin-top:1px;}

.gw{padding:4px 12px 10px;height:190px;}

.en{font-size:10px;font-weight:700;margin-bottom:3px;}
.ev{font-size:16px;font-weight:700;line-height:1.2;}
.es{font-size:9px;color:var(--gray);margin-top:2px;}

.iml{font-size:10px;font-weight:700;}

.ridom{border-radius:7px;padding:7px 9px;}
.rdn{font-size:9px;font-weight:700;margin-bottom:3px;}
.rdb{height:4px;border-radius:99px;background:#e2e8f0;margin-bottom:3px;}
.rdbf{height:100%;border-radius:99px;}
.rdv{font-size:13px;font-weight:700;}
.rifo{padding:6px 12px 12px;font-size:10px;color:#475569;line-height:1.8;}

.ail{font-size:11px;color:var(--gray);}
.aiv{font-size:11px;font-weight:700;}
.aic{font-size:9px;color:#94A3B8;margin-left:4px;}

.popb{padding:12px 14px;}
.hrow{display:flex;align-items:center;gap:8px;margin-bottom:9px;}

@media(max-width:700px){.kstrip{grid-template-columns:repeat(2,1fr);}.agrid{grid-template-columns:repeat(2,1fr);}.egrid{grid-template-columns:repeat(2,1fr);}}
