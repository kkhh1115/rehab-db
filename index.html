<body>
<div id="root"></div>
<script>
const {useState,useEffect,useRef,useMemo}=React;
const r=(t,p,...c)=>React.createElement(t,p,...c);
const DC={RM:'#0F6E56',NU:'#534AB7',NS:'#185FA5',OS:'#BA7517',CS:'#993C1D'};
const DIAGS=['뇌경색','뇌출혈','척수손상','외상성뇌손상','파킨슨병','기타'];
const REFS=['RM','NU','NS','OS','CS'];
const EFIELDS=[
  {id:'bbs',lbl:'BBS',unit:'점',max:56},
  {id:'mbi',lbl:'MBI',unit:'점',max:100},
  {id:'fac',lbl:'FAC',unit:'단계',max:5},
  {id:'fmaLe',lbl:'FMA-LE',unit:'점',max:34},
  {id:'fmaUe',lbl:'FMA-UE',unit:'점',max:66},
  {id:'mmse',lbl:'MMSE-K',unit:'점',max:30},
  {id:'tug',lbl:'TUG',unit:'초',max:null},
  {id:'masa',lbl:'MASA',unit:'점',max:200},
  {id:'mmt',lbl:'MMT(Rt)',unit:'등급',max:5},
  {id:'6mwt',lbl:'6MWT',unit:'m',max:600},
];

function rc(v){return v>=75?'#0F6E56':v>=50?'#185FA5':v>=25?'#BA7517':'#A32D2D';}

// Firebase helpers
const DB=()=>window._db;
async function fbAll(){const s=await DB().collection('patients').get();return s.docs.map(d=>({id:d.id,...d.data()}));}
async function fbSave(pt){const{id,...data}=pt;if(id){await DB().collection('patients').doc(id).set(data,{merge:true});return id;}else{const ref=await DB().collection('patients').add(data);return ref.id;}}
async function fbDel(id){await DB().collection('patients').doc(id).delete();}
function fbListen(cb){return DB().collection('patients').onSnapshot(s=>cb(s.docs.map(d=>({id:d.id,...d.data()}))));}

// PDF text extractor
async function pdfToText(buf){
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let txt='';
  for(let i=1;i<=pdf.numPages;i++){
    const pg=await pdf.getPage(i);
    const tc=await pg.getTextContent();
    txt+=tc.items.map(x=>x.str).join(' ')+'\n';
  }
  return txt;
}

// CSV row parser
function parseCSV(text){
  const lines=text.trim().split('\n').map(l=>l.trim()).filter(l=>l);
  if(!lines.length)return{pts:[],evals:[]};
  const hdrs=lines[0].split(',').map(h=>h.trim().replace(/"/g,'').toLowerCase());
  const isPatSheet=hdrs.some(h=>/이름|name|환자|등록/.test(h));
  const pts=[],evals=[];
  if(isPatSheet){
    for(const ln of lines.slice(1)){
      const c=ln.split(',').map(s=>s.trim().replace(/"/g,''));
      if(!c[0])continue;
      const row={evals:{}};
      hdrs.forEach((h,i)=>{
        if(/이름|name/.test(h))row.name=c[i];
        else if(/등록|ptid|번호/.test(h))row.ptId=c[i];
        else if(/나이|age/.test(h))row.age=parseInt(c[i])||0;
        else if(/성별|gender|sex/.test(h))row.g=c[i];
        else if(/진단|diag/.test(h))row.diag=c[i];
        else if(/입원일|admit/.test(h))row.admit=c[i];
        else if(/재원|days/.test(h))row.days=parseInt(c[i])||0;
        else if(/협진|ref|주치/.test(h))row.ref=c[i];
        else if(/교수|dr|담당/.test(h))row.dr=c[i];
        else{
          const ef=EFIELDS.find(f=>f.lbl.toLowerCase()===h||f.id===h);
          if(ef&&c[i]){
            if(!row.evals[ef.id])row.evals[ef.id]=[];
            row.evals[ef.id].push({date:row.admit||'00.00',v:parseFloat(c[i])});
          }
        }
      });
      if(row.name||row.ptId)pts.push(row);
    }
  }
  // eval-only rows
  const di=hdrs.findIndex(h=>/날짜|date/.test(h));
  const ni=hdrs.findIndex(h=>/항목|평가|assessment/.test(h));
  const vi=hdrs.findIndex(h=>/값|점수|score|value/.test(h));
  if(!isPatSheet&&di>=0){
    for(const ln of lines.slice(1)){
      const c=ln.split(',').map(s=>s.trim().replace(/"/g,''));
      if(ni>=0&&vi>=0){
        const ef=EFIELDS.find(f=>f.lbl.toLowerCase()===c[ni]?.toLowerCase()||f.id===c[ni]?.toLowerCase());
        if(ef)evals.push({field:ef.id,val:parseFloat(c[vi]),date:c[di]});
      } else {
        hdrs.forEach((h,i)=>{
          const ef=EFIELDS.find(f=>f.lbl.toLowerCase()===h||f.id===h);
          if(ef&&c[i])evals.push({field:ef.id,val:parseFloat(c[i]),date:c[di]});
        });
      }
    }
  }
  return{pts,evals};
}

// Free-text PDF keyword parser
function parseFreeText(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
  const pt={name:'',ptId:'',age:0,g:'',diag:'',icd:'',admit:'',days:0,ref:'',dr:'',evals:{}};
  for(const line of lines){
    if(!pt.name&&/(환자명|이름|성명)/.test(line)){const m=line.match(/[\uAC00-\uD7A3]{2,5}/g);if(m&&m.length)pt.name=m[m.length-1];}
    if(!pt.ptId){const m=line.match(/등록번호[^\d]*(\d{5,8})/);if(m)pt.ptId=m[1];}
    if(!pt.age){const m=line.match(/(\d{1,3})\s*세/);if(m)pt.age=parseInt(m[1]);}
    if(!pt.g){if(/(남성|남자)/.test(line))pt.g='남';else if(/(여성|여자)/.test(line))pt.g='여';}
    if(!pt.diag){const m=line.match(/(뇌경색|뇌출혈|척수손상|외상성뇌손상|파킨슨)/);if(m)pt.diag=m[1];}
    if(!pt.icd){const m=line.match(/([A-Z]\d{2}(?:\.\d{1,2})?)/);if(m)pt.icd=m[1];}
    if(!pt.admit){const m=line.match(/(\d{4})[./-](\d{1,2})[./-](\d{1,2})/);if(m)pt.admit=m[2].padStart(2,'0')+'.'+m[3].padStart(2,'0');}
    if(!pt.days){const m=line.match(/재원\s*(\d+)/);if(m)pt.days=parseInt(m[1]);}
    if(!pt.dr){const m=line.match(/(담당|교수)[^\uAC00-\uD7A3]*([\uAC00-\uD7A3]{2,4})\s*교수/);if(m)pt.dr=m[2];}
    if(!pt.ref){const m=line.match(/\b(RM|NU|NS|OS|CS)\b/);if(m)pt.ref=m[1];}
    EFIELDS.forEach(f=>{
      const re=new RegExp(f.lbl.replace('-','\\-')+'[^\\d]*(\\d{1,3})(?:\\s*(?:점|초|m|단계|등급))?');
      const m=line.match(re);
      if(m){
        const dm=line.match(/(\d{2})\.(\d{2})/);
        const date=dm?dm[0]:'00.00';
        if(!pt.evals[f.id])pt.evals[f.id]=[];
        if(!pt.evals[f.id].some(h=>h.date===date))
          pt.evals[f.id].push({date,v:parseFloat(m[1])});
      }
    });
  }
  if(!pt.name)pt.name='파싱된 환자';
  return pt;
}

// Sparkline
function Spark({data,color}){
  if(!data||data.length<2)return null;
  const W=50,H=18,mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>i/(data.length-1)*W+','+(H-2-(v-mn)/rng*(H-5))).join(' ');
  return React.createElement('svg',{width:W,height:H,style:{display:'block'}},React.createElement('polyline',{points:pts,fill:'none',stroke:color,strokeWidth:1.8,strokeLinejoin:'round',strokeLinecap:'round'}));
}

// Patient card
function PtCard({p,onClick}){
  const evals=p.evals||{};
  const scores=EFIELDS.map(f=>{const h=evals[f.id];return h&&h.length?h[h.length-1].v:null;}).filter(v=>v!=null);
  const ri=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length*10):0;
  const col=rc(ri),dc=DC[p.ref]||'#64748B';
  return r('div',{className:'ptcard',onClick},
    r('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:5}},
      r('div',null,r('div',{style:{fontSize:14,fontWeight:700,color:'#132743'}},p.name||'이름없음'),r('div',{style:{fontSize:10,color:'#64748B',marginTop:1}},(p.age||'—')+'세 · '+(p.g||'—'))),
      r('span',{style:{fontSize:9,fontWeight:700,padding:'2px 7px',borderRadius:99,background:dc+'18',color:dc,border:'0.5px solid '+dc+'44'}},p.ref||'—')
    ),
    r('div',{style:{fontSize:10,color:'#475569',marginBottom:1}},p.diag||'진단 미입력'),
    r('div',{style:{fontSize:9,color:'#94A3B8',marginBottom:8}},p.dr?p.dr+' 교수':'담당 미입력'),
    r('div',{style:{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginBottom:4}},
      r('div',null,r('div',{style:{fontSize:9,color:'#94A3B8'}},'지표 평균'),r('div',{style:{fontSize:20,fontWeight:700,color:col}},ri)),
      r('div',{style:{fontSize:9,color:'#94A3B8',textAlign:'right'}},(p.days||0)+'일째')
    ),
    r('div',{style:{height:4,background:'#F1F5F9',borderRadius:99,overflow:'hidden'}},r('div',{style:{width:Math.min(100,ri)+'%',height:'100%',background:col,borderRadius:99}}))
  );
}

// Sidebar row
function PtRow({p,sel,onClick}){
  const dc=DC[p.ref]||'#64748B';
  return r('div',{className:'ptr'+(sel?' on':''),onClick},
    r('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between'}},
      r('div',null,
        r('div',{style:{fontSize:11,fontWeight:700,color:'#132743'}},p.name,' ',r('span',{style:{fontSize:9,color:'#94A3B8',fontWeight:400}},p.age+'세 '+p.g)),
        r('div',{style:{fontSize:9,marginTop:1}},r('span',{style:{color:dc,fontWeight:700}},p.ref),' · ',r('span',{style:{color:'#64748B'}},p.dr||'—'))
      ),
      r('div',{style:{fontSize:9,color:'#94A3B8'}},p.days+'일')
    ),
    r('div',{style:{fontSize:9,color:'#475569',marginTop:2}},p.diag||'—')
  );
}

// Filter bar
function FilterBar({f,setF,cnt,total}){
  const o=(key,val,lbl,col)=>{const on=f[key]===val;return r('button',{key:val,className:'fopt'+(on?' on':''),style:on&&col?{background:col}:{},onClick:()=>setF(p=>({...p,[key]:val}))},lbl);};
  return r('div',{className:'fltbar'},
    r('div',{className:'fg'},r('span',{className:'flbl'},'나이'),o('age','전체','전체'),o('age','<60','~59세'),o('age','60s','60대'),o('age','70s','70대'),o('age','80+','80세+')),
    r('div',{className:'fg'},r('span',{className:'flbl'},'성별'),o('g','전체','전체'),o('g','남','남','#185FA5'),o('g','여','여','#993C1D')),
    r('div',{className:'fg'},r('span',{className:'flbl'},'진단'),o('diag','전체','전체'),...DIAGS.map(d=>o('diag',d,d))),
    r('div',{className:'fg'},r('span',{className:'flbl'},'과'),o('ref','전체','전체'),...REFS.map(v=>o('ref',v,v,DC[v]))),
    r('span',{style:{marginLeft:'auto',fontSize:11,fontWeight:600,color:cnt<total?'#BA7517':'#94A3B8'}},cnt<total?cnt+'/'+total+'명':total+'명')
  );
}

// Patient form modal
function PtModal({pt,onClose,onSave}){
  const isNew=!pt.id;
  const[fm,setFm]=useState({name:'',ptId:'',age:'',g:'남',diag:'뇌경색',icd:'',admit:'',days:'',ref:'RM',dr:'',...pt});
  const s=(k,v)=>setFm(p=>({...p,[k]:v}));
  return r('div',{className:'popbg',onClick:onClose},
    r('div',{className:'pop',onClick:e=>e.stopPropagation()},
      r('div',{className:'poph',style:{background:isNew?'#0F6E56':'#185FA5'}},r('div',{className:'popt'},isNew?'+ 새 환자 등록':'환자 정보 수정'),r('button',{className:'popx',onClick:onClose},'✕')),
      r('div',{className:'popb'},
        r('div',{className:'fgrid'},

// Eval entry modal
function EvalModal({pt,onClose,onSave}){
  const today=new Date();
  const defDate=(today.getMonth()+1).toString().padStart(2,'0')+'.'+(today.getDate()).toString().padStart(2,'0');
  const[date,setDate]=useState(defDate);
  const[vals,setVals]=useState({});
  return r('div',{className:'popbg',onClick:onClose},
    r('div',{className:'pop',onClick:e=>e.stopPropagation()},
      r('div',{className:'poph',style:{background:'#534AB7'}},r('div',{className:'popt'},'📋 평가 입력 — '+pt.name),r('button',{className:'popx',onClick:onClose},'✕')),
      r('div',{className:'popb'},
        r('div',{style:{marginBottom:10}},
          r('label',{style:{fontSize:10,color:'#64748B',display:'block',marginBottom:4,fontWeight:600}},'측정일'),
          r('input',{className:'inp',value:date,placeholder:'04.17',onChange:e=>setDate(e.target.value),style:{width:140}})
        ),
        r('div',{className:'agrid'},...EFIELDS.map(f=>r('div',{key:f.id,className:'ac'},
          r('label',null,f.lbl+(f.max?' /'+f.max:''),' ',r('span',{style:{color:'#94A3B8',fontSize:9}},f.unit)),
          r('input',{className:'inp',type:'number',placeholder:'입력',value:vals[f.id]||'',onChange:e=>setVals(p=>({...p,[f.id]:e.target.value}))})
        ))),
        r('button',{className:'btn bg',style:{width:'100%',marginTop:8},onClick:async()=>{
          if(!date){alert('측정일을 입력해주세요');return;}
          const ne={...(pt.evals||{})};
          Object.entries(vals).forEach(([id,v])=>{
            if(!v)return;
            if(!ne[id])ne[id]=[];
            if(!ne[id].some(h=>h.date===date))
              ne[id]=[...ne[id],{date,v:parseFloat(v)}].sort((a,b)=>a.date.localeCompare(b.date));
          });
          await onSave({...pt,evals:ne});
          onClose();
        }},'저장')
      )
    )
  );
}

// Upload modal
function UploadModal({onClose,onParsed,selPt}){
  const[log,setLog]=useState([]);
  const[drag,setDrag]=useState(false);
  const[busy,setBusy]=useState(false);
  const[preview,setPreview]=useState(null);
  const fr=useRef();
  const addLog=m=>setLog(p=>[...p,m]);

  async function proc(file){
    if(busy)return;
    const nm=file.name.toLowerCase();
    setBusy(true);
    try{
      if(nm.endsWith('.pdf')){
        addLog('📄 '+file.name+' → 텍스트 추출 중...');
        const buf=await file.arrayBuffer();
        let txt='';
        try{ txt=await pdfToText(buf); }
        catch(err){ addLog('⚠️ PDF 추출 실패: '+err.message); setBusy(false); return; }
        if(!txt.trim()){ addLog('⚠️ 텍스트 없는 스캔 PDF입니다. EMR 출력본(텍스트 PDF)을 사용해주세요.'); setBusy(false); return; }
        addLog('📝 텍스트 '+txt.length+'자 추출 완료 → 항목 분석 중...');
        const{pts,evals}=parseCSV(txt);
        if(pts.length>0){
          addLog('✅ 환자 '+pts.length+'명, 평가 '+evals.length+'건 파싱');
          setPreview({pts,evals,fname:file.name,rawText:txt});
        } else {
          const pt=parseFreeText(txt);
          addLog('✅ 자유형식 파싱 완료 → "'+pt.name+'" 인식');
          setPreview({pts:[pt],evals:[],fname:file.name,rawText:txt});
        }
      } else if(nm.endsWith('.xlsx')||nm.endsWith('.xls')){
        addLog('📊 '+file.name+' → Excel 파싱 중...');
        const buf=await file.arrayBuffer();
        const wb=XLSX.read(buf,{type:'array'});
        const allCsv=wb.SheetNames.map(sn=>XLSX.utils.sheet_to_csv(wb.Sheets[sn])).join('\n');
        const{pts,evals}=parseCSV(allCsv);
        addLog('✅ 환자 '+pts.length+'명, 평가 '+evals.length+'건 파싱');
        setPreview({pts,evals,fname:file.name});
      } else if(nm.endsWith('.csv')){
        addLog('📋 '+file.name+' → CSV 파싱 중...');
        const txt=await file.text();
        const{pts,evals}=parseCSV(txt);
        addLog('✅ 환자 '+pts.length+'명, 평가 '+evals.length+'건 파싱');
        setPreview({pts,evals,fname:file.name});
      } else { addLog('⚠️ PDF, XLSX, CSV만 지원합니다'); }
    }catch(err){ addLog('❌ 오류: '+err.message); console.error(err); }
    setBusy(false);
  }

  return r('div',{className:'popbg',onClick:()=>!busy&&onClose()},
    r('div',{className:'pop',style:{maxWidth:560},onClick:e=>e.stopPropagation()},
      r('div',{className:'poph',style:{background:'#132743'}},r('div',{className:'popt'},'📁 파일 업로드 — PDF · Excel · CSV'),r('button',{className:'popx',onClick:()=>!busy&&onClose()},'✕')),
      r('div',{className:'popb'},
        r('div',{className:'upzone'+(drag?' drag':''),
          style:busy?{opacity:.6,pointerEvents:'none'}:{},
          onDragOver:e=>{e.preventDefault();setDrag(true);},
          onDragLeave:()=>setDrag(false),
          onDrop:async e=>{e.preventDefault();setDrag(false);for(const f of e.dataTransfer.files)await proc(f);},
          onClick:()=>fr.current&&fr.current.click()},
          r('div',{style:{fontSize:28,marginBottom:6}},busy?'⏳':'📄'),
          r('div',{style:{fontSize:13,fontWeight:700,color:'#132743'}},busy?'분석 중...':'PDF · Excel · CSV 드래그 또는 클릭'),
          r('div',{style:{fontSize:10,color:'#94A3B8',marginTop:3}},'.pdf · .xlsx · .xls · .csv')
        ),
        r('input',{ref:fr,type:'file',accept:'.pdf,.csv,.xlsx,.xls',multiple:true,style:{display:'none'},onChange:async e=>{for(const f of e.target.files)await proc(f);}}),
        r('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,margin:'10px 0 4px',fontSize:10}},
          r('div',{style:{background:'#FFF7ED',border:'0.5px solid #F59E0B',borderRadius:8,padding:'8px 10px'}},
            r('div',{style:{fontWeight:700,color:'#B45309',marginBottom:2}},'📄 PDF 파싱'),
            r('div',{style:{color:'#78350F',lineHeight:1.7}},'EMR 출력 텍스트 PDF',r('br',null),'환자정보+평가점수 자동인식',r('br',null),'스캔본은 지원 안됨')
          ),
          r('div',{style:{background:'#F0FDF4',border:'0.5px solid #22C55E',borderRadius:8,padding:'8px 10px'}},
            r('div',{style:{fontWeight:700,color:'#15803D',marginBottom:2}},'📊 Excel / CSV'),
            r('div',{style:{color:'#166534',lineHeight:1.7}},'이름,나이,진단,BBS,MBI...',r('br',null),'날짜,BBS,MBI,FAC...',r('br',null),'빠르고 정확')
          )
        ),
        log.length>0&&r('div',{className:'plog'},log.map((l,i)=>r('div',{key:i},l))),
        preview&&r('div',{className:'preview-box'},
          r('div',{className:'preview-hdr'},
            r('span',{style:{fontSize:12,fontWeight:700,color:'#fff'}},'✅ 파싱 결과 — 환자 '+preview.pts.length+'명'),
            r('span',{style:{fontSize:10,color:'#86efac'}},'확인 후 등록하세요')
          ),
          r('div',{className:'preview-rows'},
            preview.pts.length===0
              ? r('div',{style:{padding:'16px',textAlign:'center',color:'#94A3B8',fontSize:12}},'인식된 환자 정보가 없습니다.')
              : preview.pts.map((p,i)=>r('div',{key:i,className:'preview-row'},
                  r('div',{style:{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}},
                    r('span',{style:{fontWeight:700,color:'#132743',minWidth:60}},p.name||'이름없음'),
                    r('span',{style:{color:'#64748B'}},(p.age||'—')+'세 '+(p.g||'')),
                    r('span',{style:{color:'#475569'}},p.diag||'—'),
                    p.ref&&r('span',{style:{color:DC[p.ref]||'#64748B',fontWeight:700}},p.ref),
                    p.dr&&r('span',{style:{color:'#64748B'}},p.dr+' 교수')
                  ),
                  Object.keys(p.evals||{}).length>0&&r('div',{style:{marginTop:4,display:'flex',gap:6,flexWrap:'wrap'}},
                    ...Object.entries(p.evals).filter(([,h])=>h&&h.length>0).map(([k,h])=>
                      r('span',{key:k,style:{fontSize:10,background:'#F1F5F9',padding:'1px 6px',borderRadius:4}},k.toUpperCase()+': '+h[h.length-1].v)
                    )
                  )
                ))
          ),
          r('div',{className:'preview-ftr'},
            r('button',{className:'btn bg',style:{flex:1},onClick:()=>{onParsed(preview.pts,preview.evals,selPt);setPreview(null);}},
              '✅ Firebase에 등록'),
            preview.rawText&&r('button',{className:'btn',style:{background:'#64748B'},onClick:()=>{
              const w=window.open('','_blank');
              if(w)w.document.write('<pre style="font-size:12px;padding:16px;white-space:pre-wrap;font-family:monospace">'+preview.rawText+'</pre>');
            }},'📄 추출 텍스트'),
            r('button',{className:'btn bgray',onClick:()=>setPreview(null)},'다시 업로드')
          )
        )
      )
    )
  );
}

// Main App
function App(){
  const[pts,setPts]=useState([]);
  const[fbOk,setFbOk]=useState(false);
  const[selId,setSelId]=useState(null);
  const[sb,setSb]=useState(true);
  const[modal,setModal]=useState(null);
  const[f,setF]=useState({age:'전체',g:'전체',diag:'전체',ref:'전체'});
  const[syncMsg,setSyncMsg]=useState('');

  useEffect(()=>{
    if(!window._db){
      console.error('Firebase DB not ready');
      return;
    }
    setFbOk(true);
    const unsub=fbListen(data=>{
      setPts(data);
      setSyncMsg(new Date().toLocaleTimeString()+'에 동기화');
    });
    return ()=>unsub();
  },[]);

  const filtPts=useMemo(()=>pts.filter(p=>{
    const a=f.age;
    if(a==='<60'&&p.age>=60)return false;
    if(a==='60s'&&(p.age<60||p.age>=70))return false;
    if(a==='70s'&&(p.age<70||p.age>=80))return false;
    if(a==='80+'&&p.age<80)return false;
    if(f.g!=='전체'&&p.g!==f.g)return false;
    if(f.diag!=='전체'&&p.diag!==f.diag)return false;
    if(f.ref!=='전체'&&p.ref!==f.ref)return false;
    return true;
  }),[pts,f]);

  const selPt=selId?pts.find(p=>p.id===selId):null;

  async function savePt(data){const id=await fbSave(data);if(!data.id)setSelId(id);}
  async function deletePt(id){await fbDel(id);setSelId(null);}

  async function handleParsed(newPts,newEvals,curPt){
    for(const p of newPts){
      const existing=pts.find(x=>x.ptId&&x.ptId===p.ptId)||pts.find(x=>x.name===p.name);
      if(existing){
        const merged={...existing,...p,id:existing.id,evals:{...(existing.evals||{}),...(p.evals||{})}};
        await fbSave(merged);
      } else {
        await fbSave({...p});
      }
    }
    if(curPt&&newEvals.length>0){
      const ne={...(curPt.evals||{})};
      for(const ev of newEvals){
        if(!ne[ev.field])ne[ev.field]=[];
        if(!ne[ev.field].some(h=>h.date===ev.date))
          ne[ev.field]=[...ne[ev.field],{date:ev.date,v:ev.val}].sort((a,b)=>a.date.localeCompare(b.date));
      }
      await fbSave({...curPt,evals:ne});
    }
    setModal(null);
  }

  // Appbar
  const appbar=r('div',{className:'appbar'},
    r('div',{className:'al'},'AI'),
    r('div',null,r('div',{className:'at'},'재활의학과 통합 대시보드'),r('div',{className:'as'},'한림대학교 성심병원 · 재활의학팀')),
    fbOk
      ? r('span',{style:{fontSize:10,color:'#86efac',marginLeft:4}},r('span',{className:'sdot'}),'실시간 연결 · '+syncMsg)
      : r('span',{style:{fontSize:10,color:'#fca5a5',marginLeft:4}},r('span',{className:'sdot off'}),'연결 중...'),
    selId&&r('button',{className:'ab',style:{marginLeft:8},onClick:()=>setSelId(null)},'← 목록'),
    r('button',{className:'ab ab-g',style:{marginLeft:'auto'},onClick:()=>setModal({type:'upload'})},'📁 파일 업로드'),
    r('button',{className:'ab ab-g',onClick:()=>setModal({type:'addPt'})},'+ 환자 등록')
  );

  // LIST VIEW
  if(!selId) return r('div',null,
    appbar,
    r(FilterBar,{f,setF,cnt:filtPts.length,total:pts.length}),
    r('div',{className:'sbar2'},
      r('span',null,'전체 ',r('b',null,pts.length),'명'),
      r('span',null,'필터 ',r('b',null,filtPts.length),'명'),
      r('span',null,'남 ',r('b',null,filtPts.filter(p=>p.g==='남').length),' / 여 ',r('b',null,filtPts.filter(p=>p.g==='여').length)),
      ...REFS.map(v=>r('span',{key:v},r('span',{style:{color:DC[v],fontWeight:700}},v),' ',r('b',null,filtPts.filter(p=>p.ref===v).length)))
    ),
    pts.length===0&&r('div',{style:{textAlign:'center',padding:'60px',color:'#94A3B8',fontSize:13}},
      fbOk?r('div',null,r('div',{style:{fontSize:18,marginBottom:8}},'👋'),r('div',{style:{fontWeight:700,marginBottom:4}},'등록된 환자가 없습니다'),r('div',{style:{fontSize:12}},'위의 "+ 환자 등록" 또는 "📁 파일 업로드" 버튼을 눌러 시작하세요')):'Firebase 연결 중...'
    ),
    r('div',{className:'ptgrid'},
      ...filtPts.map(p=>r(PtCard,{key:p.id,p,onClick:()=>setSelId(p.id)})),
      filtPts.length===0&&pts.length>0&&r('div',{style:{gridColumn:'1/-1',textAlign:'center',padding:'40px',color:'#94A3B8',fontSize:13}},'조건에 맞는 환자가 없습니다.')
    ),
    modal?.type==='addPt'&&r(PtModal,{pt:{},onClose:()=>setModal(null),onSave:savePt}),
    modal?.type==='upload'&&r(UploadModal,{onClose:()=>setModal(null),onParsed:handleParsed,selPt:null})

  // DETAIL VIEW
  return r('div',null,

        r('div',{key:l,style:{padding:'0 10px',borderRight:'1px solid #2D4A6E'}},r('div',{style:{fontSize:9,color:'#8FAEC5',marginBottom:1}},l),r('div',{style:{fontSize:11,fontWeight:600,color:'#fff'}},v))
      )
    ),
    r('div',{className:'split'},
      sb&&r('div',{className:'sb'},
        r('div',{className:'sbh'},r('span',null,filtPts.length+'명'),r('button',{style:{fontSize:10,background:'none',border:'none',cursor:'pointer',color:'#64748B',fontFamily:'var(--font)'},onClick:()=>setSb(false)},'✕')),
        ...filtPts.map(p=>r(PtRow,{key:p.id,p,sel:p.id===selId,onClick:()=>setSelId(p.id)}))
      ),
      !sb&&r('button',{className:'ab',style:{margin:'12px 0 0 12px',background:'#132743',display:'block'},onClick:()=>setSb(true)},'☰'),
      selPt&&r(DetailView,{pt:selPt,onEdit:()=>setModal({type:'editPt'}),onAddEval:()=>setModal({type:'eval'}),onDelete:deletePt})
    ),
    modal?.type==='addPt'&&r(PtModal,{pt:{},onClose:()=>setModal(null),onSave:savePt}),
    modal?.type==='editPt'&&r(PtModal,{pt:selPt,onClose:()=>setModal(null),onSave:savePt}),
    modal?.type==='eval'&&r(EvalModal,{pt:selPt,onClose:()=>setModal(null),onSave:async u=>{await fbSave(u);setModal(null);}}),
    modal?.type==='upload'&&r(UploadModal,{onClose:()=>setModal(null),onParsed:handleParsed,selPt})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
